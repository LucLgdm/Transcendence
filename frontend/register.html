<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title data-i18n="register-page-title">Créer un compte</title>
	<link rel="icon" href="favicon.ico" type="image/x-icon">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
	<link rel="stylesheet" href="custom.css">
</head>
<body class="register-page bg-app d-flex flex-column min-vh-100">
	<header class="topbar border-bottom border-light border-opacity-25">
		<div class="container-fluid d-flex flex-wrap align-items-center justify-content-between gap-2 py-2 px-3">
			<div class="navbar-brand mb-0 brand" data-i18n="brand">• Transcendance</div>
			<nav class="topnav">
				<a class="btn btn-outline-light btn-sm rounded-pill text-decoration-none" href="./index.html" data-i18n="back-to-site">Retour au site</a>
			</nav>
		</div>
	</header>

	<main class="register-main flex-grow-1 w-100">
		<section class="card app-panel register-card border-0 shadow p-4 p-md-5">
			<div class="register-header text-center mb-4">
				<h1 class="h2 mb-0" data-i18n="register-page-title">Créer un compte</h1>
			</div>

			<form id="registerForm" class="register-form">
				<div class="mb-3">
					<label for="email" class="form-label" data-i18n="email">Adresse e-mail</label>
					<input id="email" class="form-control" type="email" name="email" required maxlength="254" autocomplete="email" inputmode="email">
				</div>

				<div class="mb-3">
					<label for="userName" class="form-label" data-i18n="username">Identifiant</label>
					<input id="userName" class="form-control" type="text" name="username" required minlength="3" maxlength="32" pattern="[a-zA-Z0-9_-]+" autocomplete="username" title="Lettres, chiffres, tiret (-) et tiret bas (_)">
				</div>

				<div class="mb-2">
					<label for="password" class="form-label" data-i18n="password">Mot de passe</label>
					<input id="password" class="form-control" type="password" name="password" required minlength="8" maxlength="128" autocomplete="new-password">
				</div>
				<p class="small text-white-50 mb-4" data-i18n="register-password-hint">Au moins 8 caractères.</p>

				<div class="d-grid gap-2 register-actions">
					<button type="submit" class="btn btn-outline-light" data-i18n="create-account">Créer le compte</button>
					<a class="btn btn-outline-light" href="./index.html" data-i18n="already-have-account">J'ai déjà un compte</a>
				</div>
			</form>
		</section>
	</main>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
	<script type="module" src="./register/register.js"></script>
</body>
</html>
