<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<title data-i18n="login-page-title">Connexion</title>
	<link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>
	<h1 data-i18n="login-page-title">Connexion</h1>

		<form id="loginForm">
			<div>
				<label for="username" data-i18n="username">Identifiant :</label><br>
				<input type="text" id="username" name="username" required>
			</div>

			<br>
				<div>
					<label for="password" data-i18n="password">Mot de passe :</label><br>
					<input type="password" id="password" name="password" required>
				</div>
			<br>
			<button type="submit" data-i18n="login">Se connecter</button>

			<br>
				<a id="oauth42Link" href="#" data-i18n="42-login">
					Connect with 42
				</a>
			<br>
			<button
				id = "createAccountBtn"
				type="button"
				onclick="window.location.href='register.html'">
				<span data-i18n="create-account">Créer un compte</span>
			</button>
		</form>

	<script type="module" src="./login.js"></script>
</body>
</html>
