<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<script type="importmap">
	{
		"imports": {
			"three": "https://unpkg.com/three@0.160.0/build/three.module.js"
		}
	}
	</script>
	<title>ft_transcendence</title>
	<style>
		.btn-42 {
			display: inline-block;
			padding: 10px 15px;
			background: black;
			color: white;
			text-decoration: none;
			border-radius: 5px;
			border: none;
			cursor: pointer;
			font-size: 1em;
		}
	</style>
</head>

<body>
    <header>
        <nav>
            <button data-view="profile">Profil</button>
            <button data-view="friends">Amis</button>
            <button data-view="chat">Chat</button>
            <button data-view="games">Jeux</button>
            <button data-view="leaderboard">Leaderboard</button>
			<button data-view="Login">Login</button>
        </nav>
    </header>

    <main>
        <section id="view-profile" class="view">
            <h2>Profil</h2>
            <div id="profile-info"></div>
        </section>

        <section id="view-friends" class="view" hidden>
            <h2>Amis</h2>
            <ul id="friends-list"></ul>
            <form id="add-friend-form">
                <input type="text" id="friend-name" placeholder="Nom d'ami" required>
                <button type="submit">Ajouter</button>
            </form>
        </section>

        <section id="view-chat" class="view" hidden>
            <h2>Chat</h2>
            <div id="chat-messages"></div>
            <form id="chat-form">
                <input type="text" id="chat-input" placeholder="Écrire un message..." required>
                <button type="submit">Envoyer</button>
            </form>
        </section>

        <section id="view-games" class="view" hidden>
            <h2>Jeux</h2>

            <div id="pong-container">
                <h3>Pong</h3>
                <div id="pong-menu" style="position: absolute; width: 600px; height: 400px; background: rgba(0,0,0,0.8); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; z-index: 10;">
                    <h2>Pong Configuration</h2>
                    
                    <label>Game Mode:
                        <select id="config-mode">
                            <option value="pvp">Player vs Player</option>
                            <option value="ai">Player vs AI</option>
                            <option value="aix2">AI vs AI</option>
                        </select>
                    </label><br>
                    
                    <label>AI Difficulty:
                        <select id="config-ai-difficulty">
                            <option value="easy">Easy</option>
                            <option value="normal">Normal</option>
                            <option value="hard">Hard</option>
                            <option value="wall">Wall</option>
                        </select>
                    </label><br>
                
                    <label>Map Theme:
                        <select id="config-theme">
                            <option value="0x444444">Classic Grey</option>
                            <option value="0x00ffff">Neon Cyan</option>
                            <option value="0xff00ff">Synthwave Pink</option>
                        </select>
                    </label><br>
                
                    <label>Game Speed:
                        <select id="config-speed">
                            <option value="1.0">Normal</option>
                            <option value="1.5">Fast</option>
                            <option value="2.0">Insane</option>
                        </select>
                    </label><br>
                
                    <label>
                        <input type="checkbox" id="config-powerups"> Enable Power-ups (Speed/Slow Orbs)
                    </label><br>
                
                    <button id="start-game-btn" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">Start Game</button>
                </div>
                <canvas id="pong-canvas" width="600" height="400"></canvas>
            </div>

            <div id="chess-container">
                <h3>Chess</h3>
                <div id="chess-board"></div>
            </div>
        </section>

        <section id="view-leaderboard" class="view" hidden>
            <h2>Leaderboard</h2>
            <table id="leaderboard-table">
                <thead>
                    <tr>
                        <th>Joueur</th>
                        <th>Score</th>
                        <th>Jeux</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>

		<section id="view-Login" class="view" hidden>
			<h2>Login</h2>
			<form id="loginForm">
				<!-- champs login -->
				<div>
					<label for="username">Identifiant :</label><br>
					<input type="text" id="username" name="username" required>
				</div>

				<br>
				<div>
					<label for="password">Mot de passe :</label><br>
					<input type="password" id="password" name="password" required>
				</div>

				<br>
				<button type="submit">Se connecter</button>

				<button
					id = "createAccountBtn"
					type="button"
					onclick="window.location.href='register.html'">
					Créer un compte
				</button>

				<br>
					<a href="http://localhost:3000/users/auth/42" class="btn-42">
						Connect with 42
					</a>
				<br>
			</form>

		<script type="module" src="./login.js"></script>
		</section> 
    </main>

    <link rel="stylesheet" href="index.css">
    <script src="index.js" type="module"></script>
</body>
</html>
